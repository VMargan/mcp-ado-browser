name: Release

# Trunk-based: only `main` releases. semantic-release reads the Conventional Commits
# merged to main, bumps the version, updates CHANGELOG, tags, creates the GitHub
# Release and publishes to npm. feature/* and bugfix/* branches never release here.
#
# No-ops cleanly until the NPM_TOKEN repository secret is set.
on:
  push:
    branches: [main]
  workflow_dispatch: {} # manual trigger (e.g. to cut the first release once NPM_TOKEN is set)

permissions:
  contents: write # tags, release, changelog commit
  issues: write
  pull-requests: write
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - name: NPM_TOKEN check
        if: env.HAS_NPM_TOKEN != 'true'
        run: echo "::notice::NPM_TOKEN secret not set — skipping release. Add it (repo Settings → Secrets) to enable automated npm publishing."

      - uses: actions/checkout@v4
        if: env.HAS_NPM_TOKEN == 'true'
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        if: env.HAS_NPM_TOKEN == 'true'
        with:
          node-version: "22"
          cache: npm

      - name: Install Google Chrome
        if: env.HAS_NPM_TOKEN == 'true'
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        if: env.HAS_NPM_TOKEN == 'true'
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

      - name: Verify (offline gates) before releasing
        if: env.HAS_NPM_TOKEN == 'true'
        run: npm run verify
        env:
          ADO_NO_SANDBOX: "1"

      - name: semantic-release
        if: env.HAS_NPM_TOKEN == 'true'
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
