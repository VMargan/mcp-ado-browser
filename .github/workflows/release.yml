name: Release

# Trunk-based CD: only `main` releases. semantic-release reads the Conventional
# Commits merged to main, bumps the version, updates CHANGELOG, tags, creates the
# GitHub Release and publishes to npm via OIDC TRUSTED PUBLISHING — no token.
#
# Prerequisite (one-time, on npmjs.com → package → Settings → Trusted Publisher):
#   Publisher: GitHub Actions | Org/user: VMargan | Repo: mcp-ado-browser
#   Workflow filename: release.yml | Allowed action: npm publish
#
# IMPORTANT: do NOT set NPM_TOKEN. An empty token disables OIDC; it must be absent.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write # tags, GitHub Release, changelog commit
  issues: write
  pull-requests: write
  id-token: write # OIDC trusted publishing + npm provenance

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Ensure npm >= 11.5.1 (required for OIDC trusted publishing)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Verify (offline gates) before releasing
        run: npm run verify
        env:
          ADO_NO_SANDBOX: "1"

      - name: Release (semantic-release → npm via OIDC)
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
          # No NPM_TOKEN on purpose — OIDC trusted publishing handles npm auth.
